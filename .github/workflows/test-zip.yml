name: Upload ZIP to Google Drive

on:
  push:
    branches: [ main ]

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create ZIP
        run: zip -r artifact.zip .

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth

      - name: Upload to Google Drive
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          python << 'EOF'
          import json
          import os
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          # Load credentials
          info = json.loads(os.environ["SERVICE_ACCOUNT_JSON"])
          creds = service_account.Credentials.from_service_account_info(
              info,
              scopes=["https://www.googleapis.com/auth/drive"]
          )

          service = build("drive", "v3", credentials=creds)

          file_metadata = {
              "name": "artifact.zip",
              "parents": [os.environ.get("FOLDER_ID")] if os.environ.get("FOLDER_ID") else []
          }

          media = MediaFileUpload("artifact.zip", mimetype="application/zip")

          service.files().create(
              body={
                  "name": "artifact.zip",
                  "parents": [os.environ["FOLDER_ID"]],
              },
              media_body=MediaFileUpload("artifact.zip", mimetype="application/zip"),
              supportsAllDrives=True,
              fields="id"
          ).execute()

